version: "3.8"

# ─────────────────────────────────────────────
#  Hadoop cluster: 1 NameNode + 3 DataNodes
#  Block size: 128 MB
#  Replication factor: 3 (data spread across all nodes)
# ─────────────────────────────────────────────

x-hadoop-env: &hadoop-env
  CORE_CONF_fs_defaultFS: hdfs://namenode:9000
  CORE_CONF_hadoop_http_staticuser_user: root
  HDFS_CONF_dfs_replication: 3
  HDFS_CONF_dfs_blocksize: 134217728        # 128 MB
  HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
  CLUSTER_NAME: lab-cluster

x-datanode: &datanode-base
  image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
  restart: unless-stopped
  environment:
    <<: *hadoop-env
    SERVICE_PRECONDITION: "namenode:9870"
  depends_on:
    - namenode
  deploy:
    resources:
      limits:
        memory: 768m

services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      <<: *hadoop-env
    volumes:
      - namenode_data:/hadoop/dfs/name
    deploy:
      resources:
        limits:
          memory: 1g

  datanode1:
    <<: *datanode-base
    container_name: datanode1
    ports:
      - "9864:9864"
    volumes:
      - datanode1_data:/hadoop/dfs/data

  datanode2:
    <<: *datanode-base
    container_name: datanode2
    ports:
      - "9865:9864"
    volumes:
      - datanode2_data:/hadoop/dfs/data

  datanode3:
    <<: *datanode-base
    container_name: datanode3
    ports:
      - "9866:9864"
    volumes:
      - datanode3_data:/hadoop/dfs/data

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  datanode3_data: