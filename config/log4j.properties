# ─────────────────────────────────────────────────────────
#  log4j.properties for Spark application
#
#  Goals:
#    - Root at ERROR — suppress all Hadoop/Parquet/Jetty noise
#    - SparkContext + DAGScheduler at INFO — job/stage events visible
#    - SparkLab (our app logger) at INFO
#    - All INFO output goes to both console and file
#    - additivity=false on named loggers to prevent double-writing
#      via root logger inheritance
# ─────────────────────────────────────────────────────────

# ── Appenders ────────────────────────────────────────────
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{HH:mm:ss} %-5p [%c{1}] %m%n

log4j.appender.file=org.apache.log4j.FileAppender
log4j.appender.file.File=results/spark_run.log
log4j.appender.file.Append=true
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{HH:mm:ss} %-5p [%c{1}] %m%n

# ── Root: errors only (suppresses all framework noise) ───
log4j.rootCategory=ERROR, console, file

# ── Named loggers: INFO + additivity=false ────────────────
# additivity=false means these loggers write ONLY to their
# own appenders and do NOT propagate to the root logger,
# preventing each message from being written twice.

log4j.logger.org.apache.spark.SparkContext=INFO, console, file
log4j.additivity.org.apache.spark.SparkContext=false

log4j.logger.org.apache.spark.scheduler.DAGScheduler=INFO, console, file
log4j.additivity.org.apache.spark.scheduler.DAGScheduler=false

log4j.logger.org.apache.spark.scheduler.TaskSchedulerImpl=INFO, console, file
log4j.additivity.org.apache.spark.scheduler.TaskSchedulerImpl=false

log4j.logger.SparkLab=INFO, console, file
log4j.additivity.SparkLab=false