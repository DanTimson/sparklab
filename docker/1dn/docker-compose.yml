x-hadoop-env: &hadoop-env
  CORE_CONF_fs_defaultFS: hdfs://namenode:9000
  CORE_CONF_hadoop_http_staticuser_user: root
  HDFS_CONF_dfs_replication: 1
  HDFS_CONF_dfs_blocksize: 134217728
  HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
  CLUSTER_NAME: lab-cluster

services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      <<: *hadoop-env
    volumes:
      - namenode_data:/hadoop/dfs/name
    deploy:
      resources:
        limits:
          memory: 1g

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    restart: unless-stopped
    ports:
      - "9864:9864"
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: "namenode:9870"
    volumes:
      - datanode1_data:/hadoop/dfs/data
    depends_on:
      - namenode
    deploy:
      resources:
        limits:
          memory: 1g

  spark-client:
    build:
      context: ../..          # project root (for requirements.txt)
      dockerfile: docker/spark-client/Dockerfile
    container_name: spark-client
    depends_on:
      - namenode
      - datanode1
    environment:
      # Spark driver runs inside Docker — keep memory in check
      SPARK_DRIVER_MEMORY: 1g
    volumes:
      - ../..:/app             # mount full project into /app
    working_dir: /app
    # Stay alive so we can docker exec into it
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 1500m

volumes:
  namenode_data:
  datanode1_data: